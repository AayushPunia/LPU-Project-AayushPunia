apiVersion: v1
kind: Service
metadata:
  name: web-fleet-service
  labels:
    app: web-fleet
spec:
  type: LoadBalancer          # AWS will automatically provision an ELB
  selector:
    app: web-fleet            # Routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80                # External port exposed by the Load Balancer
      targetPort: 80          # Port on the container to forward to